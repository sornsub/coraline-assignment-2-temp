apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-portal
spec:
  template:
    spec:
      containers:
        - name: atlas-portal
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-api
spec:
  template:
    spec:
      containers:
        - name: orion-api
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
