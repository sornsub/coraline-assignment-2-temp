apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-portal
spec:
  template:
    spec:
      containers:
        - name: atlas-portal
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-api
spec:
  template:
    spec:
      containers:
        - name: orion-api
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
