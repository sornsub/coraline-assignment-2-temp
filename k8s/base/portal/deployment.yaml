apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-portal
  labels:
    app.kubernetes.io/name: atlas-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-portal
    spec:
      containers:
        - name: atlas-portal
          image: ghcr.io/example/atlas-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
