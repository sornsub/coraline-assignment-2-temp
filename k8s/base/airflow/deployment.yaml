apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  labels:
    app.kubernetes.io/name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow
    spec:
      containers:
        - name: airflow
          image: apache/airflow:2.10.4
          imagePullPolicy: IfNotPresent
          args: ["standalone"]
          env:
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
              value: "false"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
